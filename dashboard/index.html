<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NoseyDolt — Mention Intelligence</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #F5F5F7;
      --surface:   #FFFFFF;
      --surface-2: #F5F5F7;
      --border:    rgba(0,0,0,0.08);
      --shadow:    0 1px 3px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.05);
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.06);
      --text:      #1D1D1F;
      --text-2:    #6E6E73;
      --text-3:    #AEAEB2;
      --blue:      #0071E3;
      --blue-bg:   rgba(0,113,227,0.08);
      --green:     #34C759;
      --green-bg:  rgba(52,199,89,0.10);
      --red:       #FF3B30;
      --red-bg:    rgba(255,59,48,0.10);
      --orange:    #FF9500;
      --orange-bg: rgba(255,149,0,0.10);
      --purple:    #8B5CF6;
      --purple-bg: rgba(139,92,246,0.10);
      --radius:    12px;
      --radius-sm: 8px;
      --radius-pill: 999px;
    }

    html { font-size: 16px; -webkit-font-smoothing: antialiased; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-weight: 400;
      min-height: 100vh;
    }

    /* ── NAV ── */
    nav {
      background: rgba(255,255,255,0.82);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
      padding: 0 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 52px;
      gap: 12px;
    }

    .nav-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    .nav-logo {
      width: 28px;
      height: 28px;
      background: var(--text);
      border-radius: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .nav-logo svg { width: 16px; height: 16px; }

    .nav-name {
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      color: var(--text);
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .live-badge {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 0.7rem;
      font-weight: 500;
      color: var(--text-2);
      background: var(--surface-2);
      border: 1px solid var(--border);
      padding: 4px 10px;
      border-radius: var(--radius-pill);
      white-space: nowrap;
    }

    .live-dot {
      width: 6px;
      height: 6px;
      background: var(--green);
      border-radius: 50%;
      animation: pulse 2.5s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.5; transform: scale(0.85); }
    }

    .branch-badge {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 0.68rem;
      font-weight: 500;
      color: var(--text-3);
      font-family: 'DM Mono', monospace;
      background: var(--surface-2);
      border: 1px solid var(--border);
      padding: 4px 10px;
      border-radius: var(--radius-pill);
      white-space: nowrap;
    }

    .nav-date {
      font-size: 0.72rem;
      color: var(--text-3);
      font-family: 'DM Mono', monospace;
      white-space: nowrap;
    }

    /* ── SEARCH (nav center) ── */
    .nav-search {
      flex: 1;
      max-width: 320px;
      position: relative;
    }

    .nav-search input {
      width: 100%;
      height: 32px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-pill);
      padding: 0 12px 0 32px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.78rem;
      color: var(--text);
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .nav-search input::placeholder { color: var(--text-3); }

    .nav-search input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(0,113,227,0.12);
      background: var(--surface);
    }

    .nav-search-icon {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-3);
      pointer-events: none;
    }

    /* ── PAGE ── */
    .page { max-width: 1200px; margin: 0 auto; padding: 2rem 2rem 4rem; }

    /* ── STAT CARDS ── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 12px;
      margin-bottom: 2rem;
    }

    .stat-card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 1.1rem 1.3rem;
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--border);
      animation: fadeIn 0.4s ease both;
    }

    .stat-card:nth-child(1) { animation-delay: 0ms; }
    .stat-card:nth-child(2) { animation-delay: 60ms; }
    .stat-card:nth-child(3) { animation-delay: 120ms; }
    .stat-card:nth-child(4) { animation-delay: 180ms; }
    .stat-card:nth-child(5) { animation-delay: 240ms; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .stat-label {
      font-size: 0.72rem;
      font-weight: 500;
      color: var(--text-2);
      margin-bottom: 6px;
      letter-spacing: 0.01em;
    }

    .stat-value {
      font-size: 2rem;
      font-weight: 600;
      letter-spacing: -0.03em;
      line-height: 1;
      color: var(--text);
    }

    .stat-value.blue   { color: var(--blue); }
    .stat-value.green  { color: var(--green); }
    .stat-value.red    { color: var(--red); }

    .stat-sub {
      font-size: 0.68rem;
      color: var(--text-3);
      margin-top: 5px;
    }

    /* ── BODY GRID ── */
    .body-grid {
      display: grid;
      grid-template-columns: 220px 1fr;
      gap: 1.5rem;
      align-items: start;
    }

    /* ── SIDEBAR ── */
    .sidebar { display: flex; flex-direction: column; gap: 1rem; }

    .sidebar-card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 1.1rem;
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--border);
    }

    .sidebar-heading {
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--text-2);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-bottom: 0.8rem;
    }

    .platform-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 8px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: background 0.12s;
      margin: 0 -8px;
    }

    .platform-item:hover { background: var(--surface-2); }

    .platform-item.active { background: var(--blue-bg); }
    .platform-item.active .platform-item-name { color: var(--blue); font-weight: 600; }
    .platform-item.active .platform-item-count { background: rgba(0,113,227,0.12); color: var(--blue); }

    .platform-item-name {
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--text);
    }

    .platform-item-count {
      font-size: 0.72rem;
      font-weight: 600;
      font-family: 'DM Mono', monospace;
      color: var(--text-2);
      background: var(--surface-2);
      padding: 2px 7px;
      border-radius: var(--radius-pill);
    }

    .sentiment-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 0;
    }

    .sentiment-label {
      font-size: 0.72rem;
      font-weight: 500;
      color: var(--text-2);
      width: 52px;
    }

    .sentiment-track {
      flex: 1;
      height: 4px;
      background: var(--bg);
      border-radius: 2px;
      overflow: hidden;
    }

    .sentiment-fill {
      height: 100%;
      border-radius: 2px;
      width: 0%;
      transition: width 1s cubic-bezier(0.4,0,0.2,1);
    }

    .sentiment-num {
      font-size: 0.68rem;
      font-family: 'DM Mono', monospace;
      color: var(--text-3);
      width: 24px;
      text-align: right;
    }

    .run-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 5px 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.7rem;
    }

    .run-row:last-child { border-bottom: none; }
    .run-date  { color: var(--text-2); font-family: 'DM Mono', monospace; }
    .run-count { font-weight: 600; color: var(--text); }

    /* ── FEED CARD ── */
    .feed-card {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--border);
      overflow: hidden;
    }

    .feed-toolbar {
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 5px;
      flex-wrap: wrap;
      background: var(--surface);
      position: sticky;
      top: 52px;
      z-index: 10;
    }

    .toolbar-label {
      font-size: 0.68rem;
      font-weight: 600;
      color: var(--text-3);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-right: 2px;
    }

    .chip {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.72rem;
      font-weight: 500;
      padding: 5px 12px;
      border-radius: var(--radius-pill);
      border: 1px solid var(--border);
      background: var(--surface-2);
      color: var(--text-2);
      cursor: pointer;
      transition: all 0.12s;
      white-space: nowrap;
    }

    .chip:hover { background: #EBEBED; color: var(--text); }

    .chip.active {
      background: var(--text);
      color: #fff;
      border-color: var(--text);
    }

    .chip.active.green-chip  { background: var(--green);  border-color: var(--green); }
    .chip.active.red-chip    { background: var(--red);    border-color: var(--red); }
    .chip.active.blue-chip   { background: var(--blue);   border-color: var(--blue); }

    .chip-divider {
      width: 1px;
      height: 20px;
      background: var(--border);
      margin: 0 3px;
      flex-shrink: 0;
    }

    /* ── MENTION ROWS ── */
    .mention {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: center;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.1s;
      animation: rowIn 0.3s ease both;
    }

    .mention:last-child { border-bottom: none; }
    .mention:hover { background: var(--surface-2); }

    @keyframes rowIn {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .mention-title {
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text);
      line-height: 1.4;
      margin-bottom: 6px;
    }

    .mention-title a {
      color: inherit;
      text-decoration: none;
    }

    .mention-title a:hover { color: var(--blue); }

    .mention-meta {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }

    .meta-tag {
      font-size: 0.68rem;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: var(--radius-pill);
    }

    .tag-hackernews   { background: var(--orange-bg); color: #CC6600; }
    .tag-reddit       { background: rgba(255,69,0,0.10); color: #CC3300; }
    .tag-github       { background: rgba(0,0,0,0.06);   color: #333; }
    .tag-stackoverflow{ background: var(--orange-bg);   color: #F48024; }
    .tag-lobsters     { background: var(--red-bg);      color: #C44; }
    .tag-moltbook     { background: var(--purple-bg);   color: var(--purple); }
    .tag-core         { background: rgba(0,0,0,0.06);   color: #888; font-style: italic; }

    .meta-reach {
      font-size: 0.68rem;
      color: var(--text-3);
      font-family: 'DM Mono', monospace;
    }

    .meta-keyword {
      font-size: 0.65rem;
      font-weight: 500;
      color: var(--text-2);
      background: var(--surface-2);
      border: 1px solid var(--border);
      padding: 1px 7px;
      border-radius: var(--radius-pill);
    }

    .meta-date {
      font-size: 0.65rem;
      color: var(--text-3);
      font-family: 'DM Mono', monospace;
    }

    .meta-author {
      font-size: 0.65rem;
      color: var(--text-3);
    }

    .mention-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 6px;
      flex-shrink: 0;
    }

    .sentiment-pill {
      font-size: 0.68rem;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: var(--radius-pill);
      white-space: nowrap;
    }

    .pill-positive { background: var(--green-bg);  color: #1A9E3F; }
    .pill-negative { background: var(--red-bg);    color: #D93025; }
    .pill-neutral  { background: var(--surface-2); color: var(--text-3); border: 1px solid var(--border); }

    .relevance-dots {
      display: flex;
      gap: 3px;
      align-items: center;
    }

    .rel-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--border);
    }

    .rel-dot.filled { background: var(--blue); }

    /* ── EMPTY / LOADING ── */
    .state-msg {
      padding: 3rem;
      text-align: center;
      color: var(--text-3);
      font-size: 0.8rem;
    }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ── RESPONSIVE ── */
    @media (max-width: 900px) {
      .body-grid { grid-template-columns: 1fr; }
      .sidebar { display: none; }
      .stats-grid { grid-template-columns: repeat(3, 1fr); }
      .nav-search { max-width: 200px; }
      .branch-badge, .nav-date { display: none; }
    }

    @media (max-width: 580px) {
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .page { padding: 1rem 1rem 3rem; }
      nav { padding: 0 1rem; }
      .nav-search { display: none; }
    }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav>
    <div class="nav-brand">
      <div class="nav-logo">
        <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="8" cy="8" r="3" fill="white"/>
          <path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.05 3.05l1.41 1.41M11.54 11.54l1.41 1.41M11.54 4.46l-1.41 1.41M4.95 11.54l-1.41 1.41" stroke="white" stroke-width="1.3" stroke-linecap="round"/>
        </svg>
      </div>
      <span class="nav-name">NoseyDolt</span>
    </div>

    <div class="nav-search">
      <svg class="nav-search-icon" width="14" height="14" viewBox="0 0 16 16" fill="none">
        <circle cx="6.5" cy="6.5" r="4.5" stroke="currentColor" stroke-width="1.5"/>
        <path d="M10 10l3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <input type="text" id="search-input" placeholder="Search mentions…" autocomplete="off" spellcheck="false">
    </div>

    <div class="nav-right">
      <div class="live-badge"><span class="live-dot"></span>Live</div>
      <div class="branch-badge">⎇ nosey/work</div>
      <span class="nav-date" id="nav-date">—</span>
    </div>
  </nav>

  <div class="page">

    <!-- STATS -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">Total Mentions</div>
        <div class="stat-value blue" id="stat-total">—</div>
        <div class="stat-sub" id="stat-today">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Platforms</div>
        <div class="stat-value" id="stat-platforms">—</div>
        <div class="stat-sub">active sources</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Positive</div>
        <div class="stat-value green" id="stat-positive">—</div>
        <div class="stat-sub">sentiment</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Negative</div>
        <div class="stat-value red" id="stat-negative">—</div>
        <div class="stat-sub">sentiment</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Neutral</div>
        <div class="stat-value" id="stat-neutral">—</div>
        <div class="stat-sub">sentiment</div>
      </div>
    </div>

    <!-- BODY -->
    <div class="body-grid">

      <!-- SIDEBAR -->
      <aside class="sidebar">

        <div class="sidebar-card">
          <div class="sidebar-heading">Platforms</div>
          <div id="platform-list">
            <div class="state-msg" style="padding:1rem 0;font-size:0.72rem;">Loading…</div>
          </div>
        </div>

        <div class="sidebar-card">
          <div class="sidebar-heading">Sentiment</div>
          <div id="sentiment-list"></div>
        </div>

        <div class="sidebar-card">
          <div class="sidebar-heading">Run History</div>
          <div id="run-history">
            <div class="state-msg" style="padding:1rem 0;font-size:0.72rem;">Loading…</div>
          </div>
        </div>

      </aside>

      <!-- FEED -->
      <div class="feed-card">
        <div class="feed-toolbar">
          <span class="toolbar-label">Platform</span>
          <button class="chip active" data-filter="all">All</button>
          <button class="chip" data-filter="hackernews">HN</button>
          <button class="chip" data-filter="reddit">Reddit</button>
          <button class="chip" data-filter="github">GitHub</button>
          <button class="chip" data-filter="stackoverflow">SO</button>
          <button class="chip" data-filter="lobsters">Lobste.rs</button>
          <button class="chip" data-filter="moltbook">Moltbook</button>
          <button class="chip" data-filter="core">Core</button>
          <div class="chip-divider"></div>
          <span class="toolbar-label">Sentiment</span>
          <button class="chip active" data-sentiment="all">All</button>
          <button class="chip green-chip" data-sentiment="2">2</button>
          <button class="chip red-chip"   data-sentiment="0">0</button>
          <button class="chip blue-chip"  data-sentiment="1">1</button>
          <div class="chip-divider"></div>
          <span class="toolbar-label">Time</span>
          <button class="chip active" data-time="all">All</button>
          <button class="chip" data-time="1h">1h</button>
          <button class="chip" data-time="12h">12h</button>
          <button class="chip" data-time="24h">24h</button>
          <button class="chip" data-time="1w">1 week</button>
          <div class="chip-divider"></div>
          <span class="toolbar-label">Order</span>
          <button class="chip active" data-order="desc">Newest</button>
          <button class="chip" data-order="asc">Oldest</button>
        </div>
        <div id="feed"><div class="state-msg">Loading mentions…</div></div>
      </div>

    </div>
  </div>

  <script>
    const OWNER = 'j0lt', REPO = 'nosey-dolt';
    const API   = `https://www.dolthub.com/api/v1alpha1/${OWNER}/${REPO}`;
    const BRANCH = 'nosey/work';

    async function sql(q) {
      const r = await fetch(`${API}?q=${encodeURIComponent(q)}&branch=${encodeURIComponent(BRANCH)}`);
      const d = await r.json();
      if (d.query_execution_status !== 'Success') throw new Error(d.query_execution_message);
      return d.rows;
    }

    const trunc = (s, n) => s && s.length > n ? s.slice(0, n) + '…' : (s || '');

    function fmtDate(s) {
      if (!s) return '';
      const d = new Date(s);
      const now = new Date();
      const diffMs = now - d;
      const diffH = diffMs / 3600000;
      if (diffH < 1) return `${Math.round(diffMs / 60000)}m ago`;
      if (diffH < 24) return `${Math.round(diffH)}h ago`;
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    }

    function fmtReach(n) {
      const v = Number(n) || 0;
      if (v >= 1000000) return (v / 1000000).toFixed(1) + 'M';
      if (v >= 1000) return (v / 1000).toFixed(1) + 'K';
      return v.toString();
    }

    function countUp(el, target, ms = 700) {
      const start = performance.now();
      (function tick(now) {
        const t = Math.min((now - start) / ms, 1);
        el.textContent = Math.round((1 - Math.pow(1 - t, 3)) * target);
        if (t < 1) requestAnimationFrame(tick);
      })(performance.now());
    }

    const PLATFORM_LABELS = {
      hackernews:    'Hacker News',
      reddit:        'Reddit',
      github:        'GitHub',
      stackoverflow: 'Stack Overflow',
      lobsters:      'Lobste.rs',
      moltbook:      'Moltbook',
    };

    const PLATFORM_SHORT = {
      hackernews:    'HN',
      reddit:        'Reddit',
      github:        'GH',
      stackoverflow: 'SO',
      lobsters:      'LB',
      moltbook:      'MB',
    };

    function platformTag(p, url) {
      if (p === 'github' && isCoreRepo(url)) {
        return `<span class="meta-tag tag-core">core</span>`;
      }
      const label = PLATFORM_SHORT[p] || (p || '?').toUpperCase().slice(0, 3);
      const cls   = `tag-${p || 'github'}`;
      return `<span class="meta-tag ${cls}">${label}</span>`;
    }

    function sentimentPill(s) {
      const v = String(s);
      if (v === '2') return `<span class="sentiment-pill pill-positive">2</span>`;
      if (v === '0') return `<span class="sentiment-pill pill-negative">0</span>`;
      return `<span class="sentiment-pill pill-neutral">1</span>`;
    }

    function relevanceDots(r) {
      const n = Math.min(5, Math.max(0, parseInt(r) || 0));
      return `<div class="relevance-dots">${[1,2,3,4,5].map(i =>
        `<div class="rel-dot${i <= n ? ' filled' : ''}"></div>`
      ).join('')}</div>`;
    }

    let allMentions = [];
    let pFilter = 'all', sFilter = 'all', searchQ = '', tFilter = 'all', sortOrder = 'desc';

    const TIME_MS = { '1h': 3600000, '12h': 43200000, '24h': 86400000, '1w': 604800000 };

    const CORE_ORGS = ['steveyegge', 'dolthub'];
    function isCoreRepo(url) {
      if (!url) return false;
      return CORE_ORGS.some(org => url.includes(`github.com/${org}/`));
    }

    function matchesFilters(m) {
      const core = m.platform === 'github' && isCoreRepo(m.url);
      if (pFilter === 'all' && m.platform === 'github') return false;
      if (pFilter === 'github' && core) return false;
      if (pFilter === 'core' && !core) return false;
      if (pFilter !== 'all' && pFilter !== 'core' && m.platform !== pFilter) return false;
      if (sFilter !== 'all' && String(m.sentiment) !== sFilter) return false;
      if (tFilter !== 'all') {
        const ts = m.posted_at || m.discovered_at;
        if (!ts) return false;
        const age = Date.now() - new Date(ts).getTime();
        if (age > TIME_MS[tFilter]) return false;
      }
      if (searchQ) {
        const q = searchQ.toLowerCase();
        const haystack = [m.title, m.content, m.keyword_hit, m.author].join(' ').toLowerCase();
        if (!haystack.includes(q)) return false;
      }
      return true;
    }

    function renderFeed() {
      const feed = document.getElementById('feed');
      let rows = allMentions.filter(matchesFilters);

      // Apply sort order
      rows = rows.slice().sort((a, b) => {
        const ta = new Date(a.posted_at || a.discovered_at || 0).getTime();
        const tb = new Date(b.posted_at || b.discovered_at || 0).getTime();
        return sortOrder === 'asc' ? ta - tb : tb - ta;
      });

      if (!rows.length) {
        feed.innerHTML = `<div class="state-msg">No mentions match this filter.</div>`;
        return;
      }

      feed.innerHTML = rows.map((m, i) => `
        <div class="mention" style="animation-delay:${Math.min(i * 20, 400)}ms"
             onclick="window.open('${m.url}','_blank')">
          <div>
            <div class="mention-title">
              <a href="${m.url}" target="_blank" onclick="event.stopPropagation()">
                ${trunc(m.title || m.url, 110)}
              </a>
            </div>
            <div class="mention-meta">
              ${platformTag(m.platform, m.url)}
              ${m.author ? `<span class="meta-author">${trunc(m.author, 24)}</span>` : ''}
              <span class="meta-reach">~${fmtReach(m.potential_reach)} reach</span>
              ${m.keyword_hit ? `<span class="meta-keyword">${m.keyword_hit}</span>` : ''}
              <span class="meta-date">${fmtDate(m.posted_at || m.discovered_at)}</span>
            </div>
          </div>
          <div class="mention-right">
            ${sentimentPill(m.sentiment)}
            ${relevanceDots(m.relevance)}
          </div>
        </div>`).join('');
    }

    // Filter chips — platform
    document.querySelectorAll('[data-filter]').forEach(btn => btn.addEventListener('click', () => {
      document.querySelectorAll('[data-filter]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      pFilter = btn.dataset.filter;
      syncSidebarPlatform(pFilter);
      renderFeed();
    }));

    // Filter chips — sentiment
    document.querySelectorAll('[data-sentiment]').forEach(btn => btn.addEventListener('click', () => {
      document.querySelectorAll('[data-sentiment]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      sFilter = btn.dataset.sentiment;
      renderFeed();
    }));

    // Filter chips — time
    document.querySelectorAll('[data-time]').forEach(btn => btn.addEventListener('click', () => {
      document.querySelectorAll('[data-time]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      tFilter = btn.dataset.time;
      renderFeed();
    }));

    // Sort order
    document.querySelectorAll('[data-order]').forEach(btn => btn.addEventListener('click', () => {
      document.querySelectorAll('[data-order]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      sortOrder = btn.dataset.order;
      renderFeed();
    }));

    // Search
    document.getElementById('search-input').addEventListener('input', e => {
      searchQ = e.target.value.trim();
      renderFeed();
    });

    function syncSidebarPlatform(val) {
      document.querySelectorAll('.platform-item').forEach(el => {
        el.classList.toggle('active', el.dataset.p === val);
      });
    }

    function sidebarPlatformClick(p) {
      pFilter = p;
      syncSidebarPlatform(p);
      // sync chip
      document.querySelectorAll('[data-filter]').forEach(b => {
        b.classList.toggle('active', b.dataset.filter === p);
      });
      renderFeed();
    }

    // Nav date
    document.getElementById('nav-date').textContent =
      new Date().toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' });

    async function init() {
      try {
        const mentions = await sql(
          `SELECT id, platform, title, url, sentiment, potential_reach,
                  keyword_hit, author, posted_at, discovered_at, relevance
           FROM mentions
           ORDER BY posted_at DESC, potential_reach DESC
           LIMIT 500`
        );
        allMentions = mentions;

        const total    = mentions.length;
        const positive = mentions.filter(m => String(m.sentiment) === '2').length;
        const negative = mentions.filter(m => String(m.sentiment) === '0').length;
        const neutral  = mentions.filter(m => String(m.sentiment) === '1').length;
        const today    = new Date().toISOString().slice(0, 10);
        const todayN   = mentions.filter(m => (m.posted_at || '').slice(0, 10) === today).length;
        const platforms = [...new Set(mentions.map(m => m.platform).filter(Boolean))];

        countUp(document.getElementById('stat-total'),     total);
        countUp(document.getElementById('stat-platforms'), platforms.length);
        countUp(document.getElementById('stat-positive'),  positive);
        countUp(document.getElementById('stat-negative'),  negative);
        countUp(document.getElementById('stat-neutral'),   neutral);
        document.getElementById('stat-today').textContent = `${todayN} new today`;

        // Platform sidebar
        const counts = {};
        mentions.forEach(m => { if (m.platform) counts[m.platform] = (counts[m.platform] || 0) + 1; });

        const platformItems = [['all', total], ...Object.entries(counts).sort((a, b) => b[1] - a[1])];

        document.getElementById('platform-list').innerHTML = platformItems.map(([p, n]) => `
          <div class="platform-item ${p === 'all' ? 'active' : ''}" data-p="${p}"
               onclick="sidebarPlatformClick('${p}')">
            <span class="platform-item-name">${p === 'all' ? 'All' : (PLATFORM_LABELS[p] || p)}</span>
            <span class="platform-item-count">${n}</span>
          </div>`).join('');

        // Sentiment sidebar
        const pairs = [
          ['Positive', positive, 'var(--green)'],
          ['Negative', negative, 'var(--red)'],
          ['Neutral',  neutral,  'var(--text-3)'],
        ];
        document.getElementById('sentiment-list').innerHTML = pairs.map(([label, n, color]) => `
          <div class="sentiment-row">
            <span class="sentiment-label">${label}</span>
            <div class="sentiment-track">
              <div class="sentiment-fill" style="background:${color}" data-w="${total ? (n/total*100).toFixed(1) : 0}"></div>
            </div>
            <span class="sentiment-num">${n}</span>
          </div>`).join('');

        setTimeout(() => {
          document.querySelectorAll('.sentiment-fill').forEach(el => { el.style.width = el.dataset.w + '%'; });
        }, 80);

        renderFeed();

        // Run history
        try {
          const runs = await sql(
            `SELECT run_date, mentions_found, new_mentions, status
             FROM daily_runs
             ORDER BY run_date DESC
             LIMIT 7`
          );
          document.getElementById('run-history').innerHTML = runs.length
            ? runs.map(r => `
                <div class="run-row">
                  <span class="run-date">${(r.run_date || '').slice(0, 10)}</span>
                  <span class="run-count">${r.mentions_found} · ${r.new_mentions} new</span>
                </div>`).join('')
            : '<div class="state-msg" style="padding:0.5rem 0;font-size:0.68rem;">No runs yet</div>';
        } catch {
          document.getElementById('run-history').innerHTML =
            '<div class="state-msg" style="padding:0.5rem 0;font-size:0.68rem;">Unavailable</div>';
        }

      } catch (err) {
        document.getElementById('feed').innerHTML =
          `<div class="state-msg">Failed to load: ${err.message}</div>`;
        console.error(err);
      }
    }

    init();
  </script>

</body>
</html>
